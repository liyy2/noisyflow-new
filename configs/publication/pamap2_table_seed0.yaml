# PAMAP2 main paper table (plots/paper.tex, Table tab:pamap2-main).
# Verified on CPU in results/publication_repro/pamap2_wearable_demo_seed0_cpu.json:
# Ref-only 0.752/0.763, raw synth 0.902/0.891,
# transported synth 0.945/0.933, Ref+transported 0.938/0.928.
# Prepare: python scripts/prepare_pamap2.py --output datasets/pamap2/pamap2_protocol_windows_11act.npz --subjects 101,102,103,104,105,106,107,108 --activities 1,2,3,4,5,6,7,12,13,16,17
# Run: OMP_NUM_THREADS=1 MKL_NUM_THREADS=1 OPENBLAS_NUM_THREADS=1 conda run -n edm python scripts/run_config_to_json.py --config configs/publication/pamap2_table_seed0.yaml --out results/publication_repro/pamap2_table_seed0.json --device cpu

seed: 0
device: cpu

data:
  type: pamap2
  params:
    path: datasets/pamap2/pamap2_protocol_windows_11act.npz
    target_subject: 107
    source_subjects: [101, 102, 105, 106, 108]
    n_per_client: null
    # Keep the 400-window target-reference pool used by the existing run;
    # the paper table's 20-window budget is enforced by stage3.ref_train_size.
    target_ref_size: 400
    target_test_size: 400
    standardize: true
    pca_dim: null
    seed: 0

loaders:
  batch_size: 128
  target_batch_size: 128
  test_batch_size: 512
  synth_batch_size: 512
  drop_last: true

stage1:
  epochs: 25
  lr: 0.001
  hidden: [256, 256, 256]
  time_emb_dim: 64
  label_emb_dim: 64
  label_prior:
    enabled: false
  dp:
    enabled: false

stage2:
  option: A
  pair_by_label: true
  pair_by_ot: false
  epochs: 40
  lr: 0.001
  flow_steps: 50
  dp:
    enabled: false
  cellot:
    enabled: false
  rectified_flow:
    enabled: true
    hidden: [256, 256]
    time_emb_dim: 64
    act: silu
    transport_steps: 50

stage3:
  classifier: rf
  epochs: 50
  lr: 0.001
  hidden: [256, 256]
  flow_steps: 30
  # Verified table target: 5 source clients x 800 samples = 4000 synthetic windows.
  M_per_client: 800
  ref_train_size: 20
  combined_synth_train_size: 3000
