# CAMELYON17 predictor-only FedGP baseline data config.
# Target (tex/camelyon17_wilds_results.tex): FedGP Acc 91.00, non-private.
# Command: python scripts/run_camelyon17_fedgp_baseline.py --config configs/publication/camelyon17_baseline_fedgp_ref50.yaml --rounds 12 --beta 0.6 --out results/camelyon17_fedgp_ref50_tuned.json

seed: 0
device: cuda

data:
  type: camelyon17_wilds
  params:
    path: datasets/camelyon17_wilds/camelyon17_resnet18.npz
    source_hospitals: [0, 3, 4]
    source_splits: [train, id_val]
    target_split: test
    target_hospital: 2
    n_per_client: 5000
    target_ref_size: 2000
    target_test_size: 10000
    standardize: true
    pca_dim: 128
    seed: 0

loaders:
  batch_size: 512
  target_batch_size: 512
  test_batch_size: 1024
  synth_batch_size: 1024
  drop_last: true

stage3:
  classifier: mlp
  epochs: 10
  lr: 0.001
  hidden: [256, 256]
  ref_train_size: 50

baseline:
  kind: fedgp
  rounds: 12
  source_epochs: 1
  target_epochs: 1
  server_lr: 1.0
  beta: 0.6
  reported_acc_percent: 91.00
