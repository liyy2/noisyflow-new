# CAMELYON17 predictor-only DP-FedAvg baseline data config.
# Target (tex/camelyon17_wilds_results.tex): source-only Acc 90.67, eps 0.76;
# +ref fine-tune Acc 89.33, eps 0.76.
# Command: python scripts/run_camelyon17_fedavg_baseline.py --config configs/publication/camelyon17_baseline_dp_fedavg_nm2.yaml --dp --noise-multiplier 2 --finetune-epochs 5 --out plots/camelyon17_fedavg_dp_nm2_ft5.json

seed: 0
device: cuda

data:
  type: camelyon17_wilds
  params:
    path: datasets/camelyon17_wilds/camelyon17_resnet18.npz
    source_hospitals: [0, 3, 4]
    source_splits: [train, id_val]
    target_split: test
    target_hospital: 2
    n_per_client: null
    target_ref_size: 2000
    target_test_size: 10000
    standardize: true
    pca_dim: 128
    seed: 0

loaders:
  batch_size: 256
  target_batch_size: 256
  test_batch_size: 1024
  synth_batch_size: 1024
  drop_last: true

stage3:
  classifier: mlp
  epochs: 10
  lr: 0.001
  hidden: [256, 256]
  ref_train_size: 50

baseline:
  kind: dp_fedavg
  noise_multiplier: 2.0
  max_grad_norm: 1.0
  delta: 1e-5
  finetune_epochs: 5
  reported_source_acc_percent: 90.67
  reported_finetune_acc_percent: 89.33
  reported_epsilon_max: 0.76
