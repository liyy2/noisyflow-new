# PBMC/Kang Fig. privacy_curve, Stage II Option B synthetic-only.
# Target points: eps:acc ~= 6.34:0.791, 14.84:0.841, 37.63:0.863, 105.89:0.874.
# Command: python run.py --config configs/publication/pbmc_kang_privacy_curve_option_b_synthetic.yaml
seed: 0
device: cpu

data:
  type: cellot_lupuspatients_kang_hvg
  params:
    path: datasets/scrna-lupuspatients/kang-hvg.h5ad
    holdout_client: 101
    split_mode: ood

    max_clients: 7
    min_cells_per_client: 400

    target_ref_size: null
    target_test_size: null

    pca_dim: 50
    standardize: false

    seed: 0

loaders:
  batch_size: 256
  target_batch_size: 256
  test_batch_size: 512
  synth_batch_size: 512
  drop_last: true

stage1:
  epochs: 30
  lr: 0.001
  hidden: [256, 256]
  time_emb_dim: 64
  label_emb_dim: 32
  label_prior:
    enabled: false
  dp:
    enabled: true
    max_grad_norm: 1.0
    noise_multiplier: 1.0
    delta: 1e-5
    grad_sample_mode: functorch

stage2:
  # OT is trained on DP synthetic source plus public target; privacy is Stage I only.
  option: B
  pair_by_label: true
  epochs: 30
  lr: 0.001
  flow_steps: 30
  dp:
    enabled: false
  rectified_flow:
    enabled: true
    hidden: [256, 256]
    time_emb_dim: 64
    act: silu
    transport_steps: 25
  cellot:
    enabled: false

stage3:
  epochs: 10
  lr: 0.001
  hidden: [256, 256]
  flow_steps: 30
  M_per_client: 5000
  ref_train_size: 50

privacy_curve:
  enabled: true
  stage: stage1
  metric: acc_ref_plus_synth
  noise_multipliers: [0.5, 1.0, 2.0, 4.0]
  output_path: plots/publication/pbmc_kang_privacy_curve_option_b_synthetic.pdf

membership_inference:
  enabled: false

shadow_mia:
  enabled: false

stage_mia:
  enabled: false

stage_shadow_mia:
  enabled: false
