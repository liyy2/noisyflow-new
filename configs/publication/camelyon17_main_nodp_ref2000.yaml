# CAMELYON17-WILDS main-table non-private large-reference run.
# Target (tex/camelyon17_wilds_results.tex): n_ref=2000, n_syn=15000,
# Synth-only 91.92, Ref-only 92.58, Ref+Synth 92.25.
# Command: python run.py --config configs/publication/camelyon17_main_nodp_ref2000.yaml

seed: 0
device: cuda

data:
  type: camelyon17_wilds
  params:
    path: datasets/camelyon17_wilds/camelyon17_resnet18.npz
    source_hospitals: [0, 3, 4]
    source_splits: [train, id_val]
    target_split: test
    target_hospital: 2
    n_per_client: 5000
    target_ref_size: 2000
    target_test_size: 10000
    standardize: true
    pca_dim: 128
    seed: 0

loaders:
  batch_size: 512
  target_batch_size: 512
  test_batch_size: 1024
  synth_batch_size: 1024
  drop_last: true

stage1:
  epochs: 20
  lr: 0.001
  hidden: [256, 256]
  time_emb_dim: 64
  label_emb_dim: 32
  label_prior:
    enabled: false
  dp:
    enabled: false

stage2:
  option: A
  pair_by_label: true
  pair_by_ot: false
  epochs: 20
  lr: 0.001
  flow_steps: 50
  dp:
    enabled: false
  rectified_flow:
    enabled: true
    hidden: [256, 256]
    time_emb_dim: 64
    act: silu
    transport_steps: 50
  cellot:
    enabled: false

stage3:
  epochs: 10
  lr: 0.001
  hidden: [256, 256]
  flow_steps: 50
  M_per_client: 5000
  ref_train_size: 2000
  combined_synth_train_size: null

privacy_curve:
  enabled: false

membership_inference:
  enabled: false

shadow_mia:
  enabled: false

stage_mia:
  enabled: false

stage_shadow_mia:
  enabled: false
