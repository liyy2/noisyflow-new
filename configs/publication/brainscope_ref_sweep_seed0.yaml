# BrainSCOPE excitatory publication reference-label sweep.
# Paper targets: best sweep point ref=20, syn=100, acc=0.755, gain=+0.143;
# best synth-only uses syn=5000 with acc=0.755.
# Command:
# python scripts/sweep_ref_sweet_spot.py --config configs/publication/brainscope_ref_sweep_seed0.yaml \
#   --ref-sizes 5,10,20,30,50,75,100,150,all \
#   --syn-sizes 100,200,500,1000,2000,5000,all \
#   --output-json plots/brainscope_ref_sweep_seed0.json \
#   --plot-output plots/brainscope_ref_sweep_seed0.pdf

seed: 0
device: cuda

data:
  type: brainscope
  params:
    path: datasets/brainscope/brainscope_excitatory_neur.npz
    label_mode: case_control
    source_cohorts: [CMC]
    include_disorders:
      - control
      - Control
      - Schizophrenia
      - Bipolar Disorder
      - ASD
      - Alzheimers/dementia
      - cognitive impairment
    target_test_size: 0.2
    standardize: true
    pca_dim: 50
    seed: 0

loaders:
  batch_size: 64
  target_batch_size: 64
  test_batch_size: 256
  synth_batch_size: 256
  drop_last: false

stage1:
  epochs: 80
  lr: 0.001
  hidden: [256, 256]
  time_emb_dim: 64
  label_emb_dim: 32
  label_prior:
    enabled: true
    mechanism: gaussian
    sigma: 1.0
  dp:
    enabled: false

stage2:
  option: C
  pair_by_label: true
  pair_by_ot: false
  epochs: 80
  lr: 0.001
  flow_steps: 50
  dp:
    enabled: false
  rectified_flow:
    enabled: true
    hidden: [256, 256]
    time_emb_dim: 64
    act: silu
    transport_steps: 50
  cellot:
    enabled: false

stage3:
  classifier: rf
  epochs: 10
  lr: 0.001
  hidden: [256, 256]
  flow_steps: 50
  M_per_client: 5000

  # sweep_ref_sweet_spot.py takes the actual ref/syn grid from CLI args above.
  ref_train_size: 20
  combined_synth_train_size: 100

privacy_curve:
  enabled: false

membership_inference:
  enabled: false

shadow_mia:
  enabled: false

stage_mia:
  enabled: false

stage_shadow_mia:
  enabled: false
